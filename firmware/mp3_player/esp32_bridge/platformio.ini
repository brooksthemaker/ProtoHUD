[env:esp32bridge]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
    pschatzmann/ESP32-A2DP @ ^1.8.6

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_BT_CLASSIC_ENABLED=y

board_build.partitions = min_spiffs.csv

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
