; ── ProtoHUD button coprocessor — RP2350 ─────────────────────────────────────
; Build/flash with PlatformIO:
;   cd firmware/button_coproc/pico
;   pio run -e coproc -t upload   # hold BOOTSEL on first flash, then it auto-resets
;   pio device monitor            # watch the HELLO / BTN / PING stream
; or from the repo root: scripts/flash_coproc.sh --build (picotool, no BOOTSEL press).
;
; `platform` is maxgerhardt's platform-raspberrypi fork: it is what teaches
; PlatformIO the earlephilhower core and the RP2350 boards. The upstream
; platformio/raspberrypi platform is mbed-core/RP2040-only and cannot build this.
;
; THE BOARD IS THE `board` LINE BELOW — the env names deliberately don't encode
; it, so they can't drift out of sync with what actually gets built. Pick the one
; matching your hardware; RP2350A and RP2350B are NOT interchangeable, because
; the ADC block moves (GP26-28 vs GP40-47) and include/config.h follows the chip:
;   board = pimoroni_pico_plus_2w  ; RP2350B QFN80 + WiFi, 16MB — also the
;                                  ;   closest def for the Pico LiPo 2 XL W
;                                  ;   (no exact def exists; same RP2350B,
;                                  ;   16MB flash and PSRAM on GP47)
;   board = pimoroni_pico_plus_2   ; RP2350B, no WiFi
;   board = rpipico2w              ; RP2350A QFN60 + WiFi (Pico 2 W), 4MB
;   board = rpipico2               ; RP2350A, no WiFi
;
; After flashing, find the stable serial path and put it in the HUD config under
; inputs.coprocessor.device:
;   ls -l /dev/serial/by-id/    # e.g. usb-ProtoHUD_Buttons-if00 (a board serial
;                               #      may be appended — use whatever appears)

[coproc_base]
platform  = https://github.com/maxgerhardt/platform-raspberrypi.git
board     = pimoroni_pico_plus_2w
framework = arduino
board_build.core = earlephilhower
; USB strings must be set THIS way, not as -DUSB_* build_flags: the core's
; platformio-build.py always injects USB_MANUFACTURER/USB_PRODUCT defines from
; these board keys (defaulting to the board def's vendor/name), so a -D in
; build_flags just loses the "redefined" conflict and the board enumerates
; under its stock name. With these set, the stable serial path becomes
; /dev/serial/by-id/usb-ProtoHUD_Buttons_<serial>-if00.
board_build.arduino.earlephilhower.usb_manufacturer = ProtoHUD
board_build.arduino.earlephilhower.usb_product      = Buttons
monitor_speed    = 115200

build_flags =

[env:coproc]
extends   = coproc_base
lib_deps =
    adafruit/Adafruit NeoPixel    ; WS2812 test zone (LEDZ verb)

; ── Voice-changer build ───────────────────────────────────────────────────────
; Same firmware + the optional core1 voice changer (mic → effect → TLV320 → spkr;
; see docs/voice-changer.md and the "Voice changer" block in include/config.h).
; Build/flash this env instead of the plain one:
;   pio run -e coproc_voice -t upload
[env:coproc_voice]
extends   = coproc_base
build_flags =
    ${coproc_base.build_flags}
    -DVOICE_CHANGER
    -DMAX_BRIDGE
    -DPERIPHERAL_HUB
lib_deps =
    ; Provides Adafruit_TLV320DAC3100.h (voice DAC). Version-pinned on purpose:
    ; this codec library's method names have shifted across releases, and
    ; dac_begin() in src/voice.cpp is written against the 1.x API. Re-check that
    ; function against examples/basicI2Sconfig before widening this.
    adafruit/Adafruit TLV320 I2S@^1.0.0
    adafruit/Adafruit NeoPixel    ; WS2812 test zone (LEDZ verb)

; MAX_BRIDGE (MAX7219 USB→SPI relay) is enabled here alongside the voice changer
; so one coprocessor does buttons + voice + MAX panels. To add it to the plain
; button build, put -DMAX_BRIDGE in that env's build_flags too.
